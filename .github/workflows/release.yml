name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x86_64
            binary_path: sipnet
          - os: macos-arm64
            artifact_name: macos-arm64
            binary_path: sipnet
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build SIPNET
        run: make
        shell: bash

      - name: Prepare release binary
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          src="${{ matrix.binary_path }}"
          archive_base="sipnet-${{ matrix.artifact_name }}-${tag}"

          if [ ! -f "$src" ]; then
            echo "Expected build artifact '${src}' not found" >&2
            exit 1
          fi

          mkdir -p dist
          cp "$src" "dist/sipnet"
          tar -C dist -czf "dist/${archive_base}.tar.gz" sipnet
          rm -f "dist/sipnet"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: sipnet-${{ matrix.artifact_name }}-${{ github.ref_name }}
          path: dist/sipnet-${{ matrix.artifact_name }}-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} [RELEASE NAME]
          body: |
            Draft release for ${{ github.ref_name }}.

            - Replace [RELEASE NAME] in the title
            - Curate highlights from changelog / release notes
            - Confirm attached binaries
          draft: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
