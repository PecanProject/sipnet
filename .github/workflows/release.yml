name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Tag to build and release (e.g. v2.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x86_64
            binary_path: sipnet
          - os: macos-latest
            artifact_name: macos-arm64
            binary_path: sipnet
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_ref || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_ref || github.ref }}

      - name: Build SIPNET
        run: make
        shell: bash

      - name: Prepare release archive
        id: prepare_archive
        shell: bash
        run: |
          tag="${RELEASE_TAG}"
          src="${{ matrix.binary_path }}"
          archive_base="sipnet-${{ matrix.artifact_name }}-${tag}"

          if [ ! -f "$src" ]; then
            echo "Expected build artifact '${src}' not found" >&2
            exit 1
          fi

          mkdir -p dist
          cp "$src" "dist/sipnet"
          tar -C dist -czf "dist/${archive_base}.tar.gz" sipnet
          rm -f "dist/sipnet"
          echo "archive_base=${archive_base}" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare_archive.outputs.archive_base }}
          path: dist/${{ steps.prepare_archive.outputs.archive_base }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_ref || github.ref_name }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_ref || github.ref_name }}
          name: ${{ github.event.inputs.release_ref || github.ref_name }} [RELEASE NAME]
          body: |
            Draft release for ${{ github.event.inputs.release_ref || github.ref_name }}.

            - Replace [RELEASE NAME] in the title
            - Curate highlights from changelog / release notes
            - Confirm attached .tar.gz archives containing the sipnet binary
          draft: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
